kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: nfs-pvc-n8n
  namespace: automation
  annotations:
    nfs.io/storage-path: "n8n"
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secret
  namespace: automation
type: Opaque
data:
  application_username: xxxxx
  application_password: xxxxx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-deployment
  labels:
    app: n8n
  namespace: automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      volumes:
      - name: n8n-storage
        persistentVolumeClaim:
          claimName: nfs-pvc-n8n
      containers:
      - name: n8n
        image: docker.n8n.io/n8nio/n8n
        ports:
        - containerPort: 5678
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: n8n-storage
        env:
        - name: N8N_BASIC_AUTH_ACTIVE
          value: "true"
        - name: N8N_BASIC_AUTH_USER
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: application_username
        - name: N8N_BASIC_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: application_password
        - name: GENERIC_TIMEZONE
          value: Europe/Berlin
        - name: TZ
          value: Europe/Berlin
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-service
  namespace: automation
spec:
  selector:
    app: n8n
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-ingress
  namespace: automation
spec:
  rules:
  - host: flow.akrami.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: n8n-service
            port:
              number: 80
